apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orders-api-admin
  namespace: production
spec:
  tls:
    - hosts:
        - admin.acme.example.com
  rules:
    - host: admin.acme.example.com
      http:
        paths:
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: orders-api
                port:
                  number: 8080
