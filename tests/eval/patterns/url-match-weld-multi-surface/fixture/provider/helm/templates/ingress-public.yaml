apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orders-api-public
  namespace: production
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  tls:
    - hosts:
        - api.acme.example.com
      secretName: acme-public-tls
  rules:
    - host: api.acme.example.com
      http:
        paths:
          - path: /v2
            pathType: Prefix
            backend:
              service:
                name: orders-api
                port:
                  number: 8080
