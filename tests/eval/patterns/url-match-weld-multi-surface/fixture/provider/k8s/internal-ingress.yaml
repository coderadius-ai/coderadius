apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: orders-api-internal
  namespace: production
spec:
  rules:
    - host: orders-api.svc.cluster.local
      http:
        paths:
          - path: /v2
            pathType: Prefix
            backend:
              service:
                name: orders-api
                port:
                  number: 8080
